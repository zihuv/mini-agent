<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM 聊天</title>
    <style>
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #auth-container, #chat-container {
            margin-bottom: 20px;
        }
        #chat-container {
            height: 500px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #e3f2fd;
            margin-left: 20%;
        }
        .bot-message {
            background-color: #f5f5f5;
            margin-right: 20%;
        }
        .message-time {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }
        .message-content {
            margin-top: 5px;
        }
        #input-container {
            display: none;
            gap: 10px;
        }
        input {
            padding: 10px;
            margin: 5px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .form-group {
            margin-bottom: 15px;
        }
    
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        #sidebar {
            width: 250px;
            border-right: 1px solid #ccc;
            padding: 20px;
            overflow-y: auto;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .conversation-item {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .conversation-item:hover {
            background-color: #f0f0f0;
        }
        
        .conversation-item.active {
            background-color: #e3f2fd;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="sidebar">
            <h3>聊天记录</h3>
            <div id="conversation-list"></div>
        </div>
        <div class="main-content">
            <h1>LLM 聊天助手</h1>
            
            <!-- 认证容器 -->
            <div id="auth-container">
        <div id="login-form">
            <h2>登录</h2>
            <div class="form-group">
                <input type="text" id="login-username" placeholder="用户名">
            </div>
            <div class="form-group">
                <input type="password" id="login-password" placeholder="密码">
            </div>
            <button onclick="login()">登录</button>
            <button onclick="showRegister()">注册新账号</button>
        </div>

        <div id="register-form" style="display: none;">
            <h2>注册</h2>
            <div class="form-group">
                <input type="text" id="register-username" placeholder="用户名">
            </div>
            <div class="form-group">
                <input type="email" id="register-email" placeholder="电子邮件">
            </div>
            <div class="form-group">
                <input type="password" id="register-password" placeholder="密码">
            </div>
            <button onclick="register()">注册</button>
            <button onclick="showLogin()">返回登录</button>
        </div>
    </div>

    <!-- 聊天容器 -->
    <div id="chat-container"></div>
    <div id="input-container">
        <input type="text" id="prompt-input" placeholder="输入您的问题...">
        <button onclick="sendMessage()">发送</button>
        <button onclick="logout()">退出登录</button>
        </div>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
